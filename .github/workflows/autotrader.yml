name: gpt-autotrader

on:
  workflow_dispatch:
    inputs:
      phase:
        description: "Trading phase to run"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - sell
          - buy
  schedule:
    # 22:35 KST during US daylight saving time
    - cron: "35 13 * * 1-5"
    # 22:50 KST during US daylight saving time
    - cron: "50 13 * * 1-5"

jobs:
  trade:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .

    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Choose trading phase
        id: phase
        run: |
          phase="${{ github.event.inputs.phase || 'both' }}"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "35 13 * * 1-5" ]; then
              phase="sell"
            elif [ "${{ github.event.schedule }}" = "50 13 * * 1-5" ]; then
              phase="buy"
            fi
          fi
          echo "phase=$phase" >> "$GITHUB_OUTPUT"
          echo "Selected phase: $phase"

      - name: Run trader
        run: |
          python -m gpt_autotrader trade --config config.yaml --once --phase "${{ steps.phase.outputs.phase }}"
