# Strategy: trend-following with RSI filter.
lookback_days: 260
fast_sma: 20
slow_sma: 50
rsi_period: 14
rsi_buy_min: 35
rsi_buy_max: 72
rsi_sell_below: 45

# Risk controls.
max_open_positions: 5
max_position_pct: 0.10          # max 10% of equity per new position
max_portfolio_exposure_pct: 0.60 # max 60% invested by this bot
min_trade_notional: 25
max_daily_loss_pct: 0.02         # stop trading if account equity is down 2% today
stop_loss_pct: 0.08              # sell if position is down 8% from average entry
take_profit_pct: 0.25            # sell if position is up 25% from average entry
cooldown_minutes: 60

# Market schedule guard.
trade_only_when_market_open: true

# Runtime files.
state_file: state.json
log_file: logs/gpt_autotrader.log
